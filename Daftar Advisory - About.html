  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

a>\n  <\u002Fnav>\n  <a class=\"cta-btn\" href=\"#contact\">Book a free call<\u002Fa>\n<\u002Fheader>\n\n<main id=\"main\">\n\n  <!-- ===== Hero ===== -->\n  <section class=\"about-hero\">\n    <div class=\"eyebrow\" style=\"margin-bottom:40px;\">About the practice<\u002Fdiv>\n    <h1>Eight years.<br>Four firms.<br>One <em>practice.<\u002Fem><\u002Fh1>\n  <\u002Fsection>\n\n  <!-- ===== Credentials ===== -->\n  <div class=\"ed-section\">\n    <div class=\"ed-block\" style=\"border-top:none;\">\n      <div class=\"ed-grid\">\n        <div class=\"ed-label\">Credentials<\u002Fdiv>\n        <div class=\"ed-prose\">\n          <p class=\"cred-lede\">\n            Daftar is run by <strong>Ahmad Al Hinaiti<\u002Fstrong> — a senior auditor trained across\n            four firms on two continents, from the IFRS work in Amman to the large-cap engagements in Riyadh.\n            Every engagement is run by the same person who took the call.\n          <\u002Fp>\n          <div class=\"cred-path\">\n            <span class=\"firm\">PwC Amman<\u002Fspan><span class=\"arrow\">→<\u002Fspan>\n            <span class=\"firm\">PwC Dubai<\u002Fspan><span class=\"arrow\">→<\u002Fspan>\n            <span class=\"firm\">MillerMusmar DC<\u002Fspan><span class=\"arrow\">→<\u002Fspan>\n            <span class=\"firm\">EY Riyadh<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cred-status\">\n            <div class=\"cred-item\">\n              <div class=\"k\">Role<\u002Fdiv>\n              <div class=\"v\">Senior auditor — IFRS, SOCPA, and US GAAP engagements<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"cred-item\">\n              <div class=\"k\">Qualification<\u002Fdiv>\n              <div class=\"v\">US CPA <em>in progress<\u002Fem> — 2 of 4 sections passed, Q3 2026 target<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"cred-item\">\n              <div class=\"k\">Standards<\u002Fdiv>\n              <div class=\"v\">IFRS · SOCPA · US GAAP · Yellow Book<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"cred-item\">\n              <div class=\"k\">Independence<\u002Fdiv>\n              <div class=\"v\">EY no-objection clearance <em>confirmed<\u002Fem><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== What this practice is ===== -->\n    <div class=\"ed-block\">\n      <div class=\"ed-grid\">\n        <div class=\"ed-label\">What this is<\u002Fdiv>\n        <div class=\"ed-prose\">\n          <p>\n            Daftar is a practice of <em>one.<\u002Fem> Fixed scope, fixed fee, one practitioner — the work is done\n            by the person you spoke to, not handed down to a team you never meet. Each engagement is priced and\n            bounded before it begins, and ends in a written deliverable plus the editable working file.\n          <\u002Fp>\n          <p>\n            This is <strong>not an audit firm.<\u002Fstrong> Daftar does not issue audit opinions, sign financial\n            statements, or provide any attest service. The work is non-attest advisory only — technical review,\n            statement preparation, audit readiness, and transaction support — kept deliberately separate from\n            the assurance function so it never compromises an auditor's independence or its own.\n          <\u002Fp>\n          <p>\n            What you get is senior judgement on the specific technical question in front of you, without the\n            overhead, the handoffs, or the lock-in. The file is yours; the position is one you can defend.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== Markets served ===== -->\n    <div class=\"ed-block\">\n      <div class=\"ed-grid\">\n        <div class=\"ed-label\">Markets served<\u002Fdiv>\n        <div>\n          <div class=\"markets\">\n            <div class=\"market-row\">\n              <div class=\"market-code\">KSA<\u002Fdiv>\n              <div>\n                <div class=\"market-name\">Saudi Arabia<\u002Fdiv>\n                <div class=\"market-detail\">SOCPA-aligned IFRS, ZATCA Phase 2, transfer pricing, Nomu readiness.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"market-row\">\n              <div class=\"market-code\">UAE<\u002Fdiv>\n              <div>\n                <div class=\"market-name\">United Arab Emirates<\u002Fdiv>\n                <div class=\"market-detail\">Corporate tax, IFRS financial statements, transaction support.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"market-row\">\n              <div class=\"market-code\">JOR<\u002Fdiv>\n              <div>\n                <div class=\"market-name\">Jordan<\u002Fdiv>\n                <div class=\"market-detail\">IFRS preparation, audit readiness, independent technical review.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Contact strip ===== -->\n  <section class=\"contact-section\" id=\"contact\">\n    <div class=\"contact-inner\">\n      <div>\n        <div class=\"eyebrow\" style=\"margin-bottom:32px;\">Currently accepting engagements<\u002Fdiv>\n        <h2 class=\"contact-title\">Start with a<br>30-minute <em>call.<\u002Fem><\u002Fh2>\n        <p class=\"contact-note\">\n          The scoping call is free and takes 30 minutes. You will get a clear answer about whether the work\n          is a fit — and if it is, a written quote within 48 hours. If it isn't, I will tell you on the call.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div class=\"contact-methods\">\n        <a class=\"contact-method\" href=\"mailto:ahmad@daftaradvisory.com\">\n          <div class=\"m-label\">Email<\u002Fdiv>\n          <div class=\"m-value\">ahmad@daftaradvisory.com<\u002Fdiv>\n          <div class=\"m-arrow\">→<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"contact-method\" href=\"tel:+962798008835\">\n          <div class=\"m-label\">Phone<\u002Fdiv>\n          <div class=\"m-value\">+962 798 008 835<\u002Fdiv>\n          <div class=\"m-arrow\">→<\u002Fdiv>\n        <\u002Fa>\n        <a class=\"contact-method\" href=\"#\" onclick=\"return false\">\n          <div class=\"m-label\">LinkedIn<\u002Fdiv>\n          <div class=\"m-value\">ahmad-alhinaiti<\u002Fdiv>\n          <div class=\"m-arrow\">→<\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ===== Footer (matches site) ===== -->\n<footer class=\"site-footer\">\n  <span class=\"wordmark\">Daftar <em>Advisory.<\u002Fem><\u002Fspan>\n  <nav class=\"footer-links\" aria-label=\"Footer\">\n    <a href=\"index.html\">Capability statement<\u002Fa>\n    <a href=\"index.html\">Research<\u002Fa>\n    <a href=\"#contact\">Start a scoping call<\u002Fa>\n    <a href=\"#\" onclick=\"return false\">Privacy<\u002Fa>\n  <\u002Fnav>\n  <div class=\"footer-copy\">© 2026 · Amman, Jordan<\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
