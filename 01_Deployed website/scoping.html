<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Scoping intake for Daftar Advisory. Tell me what you need and I'll send a fixed quote within 48 hours.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Advisory — Scoping intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============ TOKENS ============ */
:root {
  --paper:      #F4F1EA;
  --paper-dark: #EBE6DA;
  --paper-card: #FAF8F1;
  --ink:        #1A1814;
  --muted:      #6B655D;
  --rust:       #A8341F;
  --rule-light: rgba(26,24,20,0.10);
  --rule-mid:   rgba(26,24,20,0.22);

  --gap-step: 56px;
  --pad-card: 28px;
  --row-pad: 22px;
  --title-scale: 1;
}
[data-density="compact"] { --gap-step: 36px; --pad-card: 20px; --row-pad: 16px; --title-scale: 0.88; }
[data-density="generous"] { --gap-step: 76px; --pad-card: 36px; --row-pad: 28px; --title-scale: 1.1; }

[data-dark="1"] {
  --paper:      #15130F;
  --paper-dark: #1F1C17;
  --paper-card: #1A1813;
  --ink:        #F4F1EA;
  --muted:      #9A938A;
  --rule-light: rgba(244,241,234,0.12);
  --rule-mid:   rgba(244,241,234,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--paper); color: var(--ink); }
body {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 17px;
  line-height: 1.55;
  font-variation-settings: "opsz" 14;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
}
button { background: none; border: 0; font: inherit; color: inherit; cursor: pointer; text-align: left; }
button:disabled { cursor: not-allowed; }
a { color: inherit; text-decoration: none; }

.mono {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-weight: 400;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
}
.mono.rust { color: var(--rust); }
em.acc { color: var(--rust); font-style: italic; font-weight: 400; }

/* ============ APP SHELL ============ */
.app { min-height: 100vh; display: flex; flex-direction: column; }

.topstrip {
  border-bottom: 1px solid var(--rule-light);
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--paper);
  position: sticky;
  top: 0;
  z-index: 10;
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
}
.topstrip .wordmark {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.topstrip .wordmark em { color: var(--rust); font-style: italic; }
.topstrip-meta { display: flex; gap: 12px; align-items: center; }
.topstrip-meta .dot { color: var(--rule-mid); }

/* PROGRESS */
.progress {
  border-bottom: 1px solid var(--rule-light);
  padding: 0 40px;
  background: var(--paper);
}
.progress-inner {
  display: flex;
  gap: 0;
  max-width: 1440px;
  margin: 0 auto;
}
.prog-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 18px 20px;
  border-right: 1px solid var(--rule-light);
  cursor: pointer;
  transition: background 0.18s;
  opacity: 0.45;
}
.prog-step:last-child { border-right: none; }
.prog-step:hover:not(:disabled) { background: var(--paper-dark); }
.prog-step.is-current { opacity: 1; background: var(--paper-dark); }
.prog-step.is-done { opacity: 0.85; }
.prog-step:disabled { cursor: not-allowed; }
.prog-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--muted);
}
.prog-step.is-current .prog-num { color: var(--rust); }
.prog-step.is-done .prog-num { color: var(--rust); }
.prog-label {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 400;
  letter-spacing: -0.005em;
}
.progress-bar {
  height: 2px;
  background: var(--rule-light);
  position: relative;
  margin: 0 -40px;
}
.progress-bar-fill {
  position: absolute;
  inset: 0;
  background: var(--rust);
  width: 0;
  transition: width 0.35s cubic-bezier(0.7,0,0.3,1);
}

/* MAIN GRID */
.main {
  flex: 1;
  max-width: 1440px;
  width: 100%;
  margin: 0 auto;
  padding: 56px 40px 80px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 64px;
  align-items: start;
}
[data-summary-side="left"] .main {
  grid-template-columns: 380px 1fr;
}
[data-summary-side="left"] .main .step-col { order: 2; }
[data-summary-side="left"] .main .summary { order: 1; }
.main.is-confirm { grid-template-columns: 1fr; max-width: 920px; }

/* STEP COL */
.step-col { min-width: 0; }
.step-head { margin-bottom: var(--gap-step); }
.step-num {
  margin-bottom: 16px;
}
.step-kicker {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 22px;
}
.step-kicker::before {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--rust);
}
.step-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: calc(clamp(40px, 4.6vw, 64px) * var(--title-scale));
  line-height: 0.98;
  letter-spacing: -0.025em;
  font-variation-settings: "opsz" 144;
  margin-bottom: 24px;
  text-wrap: pretty;
}
.step-title em { color: var(--rust); font-style: italic; font-weight: 300; }
.step-lede {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  line-height: 1.6;
  max-width: 560px;
  color: var(--ink);
  font-variation-settings: "opsz" 14;
  text-wrap: pretty;
}
.step-body { animation: fadeUp 0.45s cubic-bezier(0.7,0,0.3,1); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* OPT GRID (market cards) */
.opt-grid { display: grid; gap: 14px; }
.opt-grid-2 { grid-template-columns: repeat(2, 1fr); }
.opt-card {
  display: flex;
  flex-direction: column;
  padding: var(--pad-card);
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  transition: all 0.2s;
  text-align: left;
  min-height: 180px;
}
.opt-card:hover { border-color: var(--rust); background: var(--paper-dark); }
.opt-card.is-active {
  border-color: var(--rust);
  background: var(--paper-dark);
  box-shadow: inset 4px 0 0 var(--rust);
}
.opt-card-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
}
.opt-flag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--rust);
}
.opt-check {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--muted);
}
.opt-card.is-active .opt-check { color: var(--rust); }
.opt-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin-bottom: 10px;
  font-variation-settings: "opsz" 36;
}
.opt-body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  flex: 1;
  font-variation-settings: "opsz" 14;
}
.opt-foot {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--rule-light);
  font-size: 10px;
}

/* OPT LIST (area rows) */
.opt-list { border-top: 2px solid var(--ink); }
.opt-row {
  width: 100%;
  display: grid;
  grid-template-columns: 110px 1fr 32px;
  gap: 24px;
  align-items: center;
  padding: var(--row-pad) 4px;
  border-bottom: 1px solid var(--rule-light);
  transition: padding 0.2s, background 0.2s;
}
.opt-row:hover { background: var(--paper-card); padding-left: 14px; padding-right: 14px; }
.opt-row.is-active { background: var(--paper-dark); padding-left: 14px; padding-right: 14px; box-shadow: inset 4px 0 0 var(--rust); }
.opt-row-num { color: var(--rust); font-weight: 500; }
.opt-row-title {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.15;
  margin-bottom: 4px;
  font-variation-settings: "opsz" 36;
}
.opt-row-sub {
  display: block;
  font-family: 'Fraunces', serif;
  font-size: 14.5px;
  color: var(--muted);
  line-height: 1.5;
  font-variation-settings: "opsz" 12;
}
.opt-row-arrow { font-size: 16px; color: var(--muted); transition: color 0.2s, transform 0.2s; text-align: right; }
.opt-row:hover .opt-row-arrow { color: var(--rust); transform: translateX(4px); }
.opt-row.is-active .opt-row-arrow { color: var(--rust); }

/* OUTCOME PICK */
.opt-stack { display: flex; flex-direction: column; gap: 12px; }
.oc-pick {
  display: block;
  padding: var(--pad-card);
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  transition: all 0.2s;
  text-align: left;
}
.oc-pick:hover { border-color: var(--rust); background: var(--paper-dark); }
.oc-pick.is-active {
  border-color: var(--rust);
  background: var(--paper-dark);
  box-shadow: inset 4px 0 0 var(--rust);
}
.oc-pick-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--rule-light);
}
.oc-pick-code { color: var(--rust); font-weight: 500; }
.oc-pick-fee { color: var(--ink); font-weight: 500; font-size: 11px; }
.oc-pick-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  font-variation-settings: "opsz" 24;
}
.oc-pick.is-active .oc-pick-title em,
.oc-pick:hover .oc-pick-title em { color: var(--rust); }
.oc-pick-body {
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 14px;
  font-variation-settings: "opsz" 12;
}
.oc-pick-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  background: var(--paper);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  color: var(--ink);
}
.oc-hidden {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 4px;
  font-size: 10px;
}
.oc-hidden-rule {
  display: inline-block;
  width: 28px;
  height: 1px;
  background: var(--muted);
}

/* CONTEXT BLOCKS */
.ctx-block { margin-bottom: 36px; }
.ctx-label {
  display: block;
  margin-bottom: 14px;
  color: var(--rust);
  font-weight: 500;
}
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 14px;
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  transition: all 0.18s;
  color: var(--ink);
}
.chip-btn:hover { border-color: var(--rust); color: var(--rust); }
.chip-btn.is-active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
[data-dark="1"] .chip-btn.is-active { background: var(--rust); color: var(--paper); border-color: var(--rust); }

.band-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  overflow: hidden;
}
.band-grid-4 { grid-template-columns: repeat(4, 1fr); }
.band-btn {
  padding: 16px 14px;
  background: var(--paper-card);
  border-right: 1px solid var(--rule-light);
  transition: background 0.18s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.band-btn:last-child { border-right: none; }
.band-btn:hover { background: var(--paper-dark); }
.band-btn.is-active {
  background: var(--ink);
  color: var(--paper);
}
[data-dark="1"] .band-btn.is-active { background: var(--rust); }
.band-label {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -0.01em;
  font-variation-settings: "opsz" 18;
}
.band-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.band-btn.is-active .band-note { color: rgba(244,241,234,0.7); }

.ctx-textarea {
  width: 100%;
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  padding: 16px 18px;
  font-family: 'Fraunces', serif;
  font-size: 16px;
  color: var(--ink);
  resize: vertical;
  line-height: 1.55;
  font-variation-settings: "opsz" 14;
  transition: border-color 0.2s;
}
.ctx-textarea:focus {
  outline: none;
  border-color: var(--rust);
}
.ctx-textarea::placeholder { color: var(--muted); font-style: italic; }
.ctx-count {
  text-align: right;
  margin-top: 8px;
  font-size: 9.5px;
  color: var(--muted);
}

/* CONTACT FORM */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
.field { display: flex; flex-direction: column; gap: 10px; }
.field-label {
  display: flex;
  gap: 4px;
  align-items: center;
  color: var(--rust);
  font-weight: 500;
}
.field-req { color: var(--muted); font-weight: 400; }
.field-hint { color: var(--muted); font-weight: 400; }
.field-err { color: var(--rust); font-weight: 500; }
.text-input {
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  padding: 14px 16px;
  font-family: 'Fraunces', serif;
  font-size: 16px;
  color: var(--ink);
  transition: border-color 0.2s;
  font-variation-settings: "opsz" 14;
}
.text-input:focus { outline: none; border-color: var(--rust); }
.text-input::placeholder { color: var(--muted); font-style: italic; }
.field.has-error .text-input { border-color: var(--rust); }

.seg {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  overflow: hidden;
}
.seg-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 11px 8px;
  text-align: center;
  background: var(--paper-card);
  border-right: 1px solid var(--rule-light);
  border-bottom: 1px solid var(--rule-light);
  transition: background 0.18s;
}
.seg-btn:nth-child(2n) { border-right: none; }
.seg-btn:nth-last-child(-n+2) { border-bottom: none; }
.seg-btn:hover { background: var(--paper-dark); }
.seg-btn.is-active { background: var(--ink); color: var(--paper); }
[data-dark="1"] .seg-btn.is-active { background: var(--rust); }

.consent {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 18px 20px;
  background: var(--paper-card);
  border-left: 2px solid var(--rust);
  font-size: 14.5px;
  line-height: 1.6;
  cursor: pointer;
  font-variation-settings: "opsz" 12;
}
.consent input { margin-top: 4px; accent-color: var(--rust); width: 16px; height: 16px; }
.consent em { color: var(--rust); font-style: italic; }

/* ACTIONS */
.actions {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 56px;
  padding-top: 28px;
  border-top: 1px solid var(--rule-light);
}
.actions-spacer { flex: 1; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-ghost { color: var(--muted); padding-left: 0; padding-right: 0; }
.btn-ghost:hover:not(:disabled) { color: var(--rust); }
.btn-ghost:disabled { opacity: 0.3; }
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover:not(:disabled) { background: var(--rust); }
.btn-primary:disabled, .btn-primary.is-disabled { opacity: 0.35; cursor: not-allowed; }
.btn-arrow { font-family: 'JetBrains Mono', monospace; transition: transform 0.2s; }
.btn-primary:hover:not(:disabled) .btn-arrow { transform: translateX(4px); }

/* ============ SUMMARY ============ */
.summary {
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
  padding: 28px;
  position: sticky;
  top: 110px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.summary-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--rule-light);
}
.summary-head .rust { font-weight: 500; }
.summary-body { display: flex; flex-direction: column; gap: 0; }
.sum-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px dashed var(--rule-light);
  align-items: baseline;
}
.sum-row:last-child { border-bottom: none; }
.sum-label { padding-top: 3px; }
.sum-value {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  line-height: 1.4;
  color: var(--ink);
  font-variation-settings: "opsz" 14;
}
.sum-row.is-filled .sum-value { font-weight: 500; }
.sum-empty { color: var(--muted); }
.sum-sub {
  font-size: 13.5px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.45;
  font-variation-settings: "opsz" 12;
}
.summary-note { font-style: italic; font-size: 14px; color: var(--muted); line-height: 1.5; }

.summary-fee {
  background: var(--paper);
  border: 1px solid var(--rust);
  border-radius: 2px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.summary-fee-val {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 36;
  line-height: 1.1;
}
.summary-fee-val em { color: var(--rust); font-style: italic; font-weight: 500; font-size: 32px; }
.summary-fee-note {
  font-size: 10px;
  line-height: 1.6;
  color: var(--muted);
  margin-top: 6px;
}

.summary-deliv .mono { display: block; margin-bottom: 12px; color: var(--rust); font-weight: 500; }
.summary-deliv ul { list-style: none; }
.summary-deliv li {
  display: flex;
  gap: 10px;
  padding: 7px 0;
  font-size: 14px;
  line-height: 1.45;
  font-variation-settings: "opsz" 12;
}
.summary-deliv li .dash { color: var(--rust); flex-shrink: 0; }

.summary-foot {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 16px;
  border-top: 1px solid var(--rule-light);
  font-size: 10px;
  line-height: 1.6;
}
.summary-foot .rust { font-weight: 500; }

/* ============ CONFIRMATION ============ */
.confirm {
  padding: 40px 0 80px;
  animation: fadeUp 0.5s cubic-bezier(0.7,0,0.3,1);
}
.confirm-mark { margin-bottom: 28px; }
.confirm-kicker { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.confirm-kicker::before { content: ''; width: 28px; height: 1px; background: var(--rust); }
.confirm-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(40px, 5vw, 68px);
  line-height: 0.98;
  letter-spacing: -0.025em;
  font-variation-settings: "opsz" 144;
  margin-bottom: 28px;
  text-wrap: pretty;
}
.confirm-title em { color: var(--rust); font-style: italic; font-weight: 300; }
.confirm-lede {
  font-size: 18px;
  line-height: 1.6;
  max-width: 680px;
  margin-bottom: 56px;
  font-variation-settings: "opsz" 14;

}

.confirm-card {
  border-top: 2px solid var(--ink);
  margin-bottom: 56px;
}
.confirm-card-head {
  padding: 20px 0;

}
.confirm-card-head .mono { color: var(--rust); font-weight: 500; }
.confirm-steps { list-style: none; }
.confirm-steps li {

.cs-num { color: var(--rust); font-weight: 500; }

.confirm-meta {

  grid-template-columns: repeat(4, 1fr);

  margin-bottom: 56px;
  border: 1px solid var(--rule-light);

.cm-block {

.cm-val {

.confirm-cta-row {

.link-back {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  color: var(--ink);
  font-style: italic;
  transition: color 0.2s;
}
.link-back:hover { color: var(--rust); }
.link-out {
  color: var(--muted);
  transition: color 0.2s;
}
.link-out:hover { color: var(--rust); }

/* ============ FOOTER ============ */
.bottomstrip {
  border-top: 1px solid var(--rule-light);
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--paper);
}
.bottomstrip a:hover { color: var(--rust); }

/* ============ RESPONSIVE ============ */
@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr; gap: 48px; }

  .confirm-meta { grid-template-columns: 1fr 1fr; }

  .opt-row { grid-template-columns: 60px 1fr 24px; gap: 12px; }

  .confirm-steps li { grid-template-columns: 36px 1fr 60px; gap: 12px; }
  .bottomstrip { padding: 18px 20px; flex-direction: column; gap: 8px; }
}

a:focus-visible, button:focus-visible {

  /* ============ REDUCED MOTION ============ */
