<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Advisory — Practice Areas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --paper:      #F4F1EA;
  --paper-dark: #EBE6DA;
  --paper-card: #FAF8F1;
  --ink:        #1A1814;
  --muted:      #78726A;
  --rust:       #A8341F;
  --rule-light: rgba(26,24,20,0.10);
  --rule-mid:   rgba(26,24,20,0.22);

  --pad-block: 120px;
  --pad-card: 32px;
  --title-scale: 1;
}
[data-density="compact"]  { --pad-block: 80px;  --pad-card: 22px; --title-scale: 0.9; }
[data-density="generous"] { --pad-block: 160px; --pad-card: 44px; --title-scale: 1.1; }

[data-dark="1"] {
  --paper:      #15130F;
  --paper-dark: #1F1C17;
  --paper-card: #1A1813;
  --ink:        #F4F1EA;
  --muted:      #9A938A;
  --rule-light: rgba(244,241,234,0.12);
  --rule-mid:   rgba(244,241,234,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--paper); color: var(--ink); }
html { scroll-behavior: smooth; }
body {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 17px;
  line-height: 1.55;
  font-variation-settings: "opsz" 14;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { background: none; border: 0; font: inherit; color: inherit; cursor: pointer; text-align: left; }
a { color: inherit; text-decoration: none; }

.mono {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  font-weight: 400;
}
.mono.rust { color: var(--rust); font-weight: 500; }
em.acc { color: var(--rust); font-style: italic; font-weight: 400; }

/* TOP */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(244,241,234,0.94);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule-light);
  padding: 18px 40px;
  display: grid;
  grid-template-columns: 220px 1fr auto;
  gap: 32px;
  align-items: center;
}
[data-dark="1"] .topbar { background: rgba(21,19,15,0.92); }
.wordmark {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  letter-spacing: -0.01em;
}
.wordmark em { color: var(--rust); font-style: italic; }
.wordmark.sm { font-size: 16px; }
/* SITE NAV (top) */
.site-nav { display: flex; gap: 28px; justify-content: center; align-items: center; }
.site-nav a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 6px 0;
  border-bottom: 1px solid transparent;
  transition: color 0.18s, border-color 0.18s;
}
.site-nav a:hover { color: var(--ink); }
.site-nav a.is-here { color: var(--rust); border-bottom-color: var(--rust); }

/* AREA SWITCH (sticky tabs, all widths) */
.area-switch {
  position: sticky;
  top: 64px;
  z-index: 49;
  background: rgba(244,241,234,0.94);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule-light);
}
[data-dark="1"] .area-switch { background: rgba(21,19,15,0.92); }
.area-switch-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.area-tab {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 14px 22px;
  border-right: 1px solid var(--rule-light);
  transition: background 0.18s, color 0.18s;
  position: relative;
  text-align: left;
}
.area-tab:first-child { border-left: 1px solid var(--rule-light); }
.area-tab:hover { background: var(--paper-dark); }
.area-tab.is-active { background: var(--paper-dark); }
.area-tab.is-active::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
  height: 2px; background: var(--rust);
}
.area-tab-num {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.area-tab.is-active .area-tab-num { color: var(--rust); }
.area-tab-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  letter-spacing: -0.005em;
  font-variation-settings: "opsz" 18;
}
.area-tab.is-active .area-tab-name { font-weight: 500; }
.cta-btn {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 18px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  transition: background 0.2s;
}
.cta-btn:hover { background: var(--rust); }

/* HERO */
.hero {
  max-width: 1280px;
  margin: 0 auto;
  padding: 96px 40px 64px;
  animation: fade 0.5s cubic-bezier(0.7,0,0.3,1);
}
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.hero-strip {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.hero-strip .dot { color: var(--rule-mid); }
.hero-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: calc(clamp(48px, 7.8vw, 124px) * var(--title-scale));
  line-height: 0.94;
  letter-spacing: -0.028em;
  font-variation-settings: "opsz" 144;
  margin-bottom: 36px;
  text-wrap: pretty;
  max-width: 1100px;
}
.hero-title em { color: var(--rust); font-style: italic; font-weight: 300; }
.hero-lede {
  font-size: 21px;
  line-height: 1.5;
  max-width: 720px;
  margin-bottom: 56px;
  text-wrap: pretty;
  font-variation-settings: "opsz" 18;
}
.hero-stat {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 28px 0;
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--rule-light);
  max-width: 720px;
}
.hero-stat-kicker {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.hero-stat-row { display: flex; align-items: baseline; gap: 28px; }
.hero-stat-num {
  font-family: 'Fraunces', serif;
  font-size: 64px;
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 0.9;
  color: var(--rust);
  font-variation-settings: "opsz" 144;
  font-style: italic;
  white-space: nowrap;
}
.hero-stat-body { flex: 1; padding-top: 6px; }
.hero-stat-label {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  line-height: 1.45;
  font-variation-settings: "opsz" 14;
  text-wrap: pretty;
  color: var(--ink);
}

/* BLOCK */
.block {
  max-width: 1280px;
  margin: 0 auto;
  padding: var(--pad-block) 40px;
}
.sec-head {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 48px;
  margin-bottom: 72px;
  align-items: start;
}
.sec-num {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--rust);
  padding-top: 14px;
}
.sec-num::before {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--rust);
}
.sec-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: calc(clamp(36px, 5vw, 64px) * var(--title-scale));
  line-height: 0.98;
  letter-spacing: -0.022em;
  font-variation-settings: "opsz" 144;
  text-wrap: pretty;
  max-width: 920px;
  margin-bottom: 24px;
}
.sec-title em { color: var(--rust); font-style: italic; font-weight: 300; }
.sec-lede {
  font-size: 17px;
  line-height: 1.65;
  max-width: 640px;
  text-wrap: pretty;
  font-variation-settings: "opsz" 14;
}

/* OUTCOMES GRID */
.oc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 2px solid var(--ink); }
.oc-card {
  padding: var(--pad-card) var(--pad-card) var(--pad-card) 0;
  border-right: 1px solid var(--rule-light);
  border-bottom: 1px solid var(--rule-light);
  display: flex;
  flex-direction: column;
}
.oc-card:not(:first-child) { padding-left: var(--pad-card); }
.oc-card:last-child { border-right: none; padding-right: 0; }
.oc-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 18px;
}
.oc-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  line-height: 1.18;
  letter-spacing: -0.01em;
  margin-bottom: 14px;
  font-variation-settings: "opsz" 36;
  text-wrap: pretty;
}
.oc-title em { color: var(--rust); font-style: italic; font-weight: 400; }
.oc-body {
  font-size: 14.5px;
  line-height: 1.6;
  margin-bottom: 18px;
  flex: 1;
  font-variation-settings: "opsz" 12;
}
/* PROMOTED FEE BLOCK */
.oc-fee-block {
  margin: 4px 0 18px;
  padding: 14px 0 16px;
  border-top: 2px solid var(--ink);
  border-bottom: 1px solid var(--rule-light);
}
.oc-fee-label {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}
.oc-fee-big {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--rust);
  font-variation-settings: "opsz" 144;
  margin-bottom: 6px;
}
.oc-fee-sub {
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.oc-deliv-toggle {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 12px 0;
  border-top: 1px solid var(--rule-light);
  border-bottom: 1px solid var(--rule-light);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 14px;
  transition: color 0.18s;
  text-align: left;
}
.oc-deliv-toggle:hover { color: var(--rust); }
.oc-deliv-count { color: var(--muted); margin-left: auto; }
.oc-deliv-caret { color: var(--rust); font-size: 14px; width: 14px; text-align: center; }

.oc-fee-legacy {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 12px 0;
  border-top: 1px solid var(--rule-light);
  border-bottom: 1px solid var(--rule-light);
  margin-bottom: 18px;
}
.oc-fee-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--rust);
  font-weight: 500;
}
.oc-deliv {
  list-style: none;
  margin-bottom: 18px;
}
.oc-deliv li {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  font-size: 13.5px;
  line-height: 1.5;
  font-variation-settings: "opsz" 12;
}
.oc-deliv .dash { color: var(--rust); }
.oc-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 9px;
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 2px;
}

/* DECISION TREE */
.tree { display: grid; gap: 0; border-top: 2px solid var(--ink); }
.tree-node {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 32px;
  padding: 36px 0;
  border-bottom: 1px solid var(--rule-light);
}
.tree-num { color: var(--rust); padding-top: 4px; font-weight: 500; }
.tree-q {
  grid-column: 2;
  font-family: 'Fraunces', serif;
  font-size: 24px;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin-bottom: 22px;
  font-variation-settings: "opsz" 36;
  font-weight: 300;
  text-wrap: pretty;
}
.tree-row {
  grid-column: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-top: 1px solid var(--rule-light);
}
.tree-yes, .tree-no {
  padding: 18px 24px 18px 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tree-yes { border-right: 1px solid var(--rule-light); }
.tree-no { padding-left: 24px; }
.tree-yes-val, .tree-no-val {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  line-height: 1.45;
  font-variation-settings: "opsz" 14;
}

/* METHODOLOGY */
.meth { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 2px solid var(--ink); }
.meth-step {
  padding: 36px 28px 36px 0;
  border-right: 1px solid var(--rule-light);
  position: relative;
}
.meth-step:not(:first-child) { padding-left: 28px; }
.meth-step:last-child { border-right: none; padding-right: 0; }
.meth-step::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 32px;
  height: 2px;
  background: var(--rust);
}
.meth-step:not(:first-child)::before { left: 28px; }
.meth-num { color: var(--rust); margin: 22px 0 14px; font-weight: 500; }
.meth-title {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.015em;
  line-height: 1.05;
  margin-bottom: 12px;
  font-variation-settings: "opsz" 48;
}
.meth-body {
  font-size: 14.5px;
  line-height: 1.6;
  font-variation-settings: "opsz" 12;
}

/* SAMPLE */
.sample-block { background: var(--paper-dark); margin: 0 -100vw; padding-left: 100vw; padding-right: 100vw; }
.sample-block .sec-head, .sample-block .sample { max-width: 1280px; margin-left: auto; margin-right: auto; padding-left: 40px; padding-right: 40px; box-sizing: border-box; }
.sample {
  display: flex;
  justify-content: center;
}
.sample-paper {
  background: var(--paper);
  border: 1px solid var(--rule-mid);
  max-width: 800px;
  width: 100%;
  box-shadow: 0 24px 48px rgba(26,24,20,0.08), 0 4px 12px rgba(26,24,20,0.05);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.55;
}
.sample-head {
  padding: 18px 40px;
  border-bottom: 1px solid var(--rule-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  color: var(--muted);
}
.sample-stamp {
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  font-style: italic;
}
.sample-body { padding: 40px 48px 48px; }
.s-h {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  font-variation-settings: "opsz" 36;
}
.s-kv { display: grid; grid-template-columns: 110px 1fr; gap: 20px; padding: 5px 0; }
.s-k { font-size: 9px; color: var(--muted); padding-top: 2px; }
.s-v {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-variation-settings: "opsz" 12;
}
.s-rule { border: 0; border-top: 1px solid var(--rule-light); margin: 18px 0; }
.s-sec {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--rust);
  margin: 22px 0 12px;
  font-weight: 500;
}
.s-p {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  line-height: 1.65;
  margin-bottom: 6px;
  font-variation-settings: "opsz" 12;
}
.s-list { list-style: none; margin: 4px 0; }
.s-list li {
  display: flex;
  gap: 10px;
  font-family: 'Fraunces', serif;
  font-size: 13.5px;
  padding: 4px 0;
  line-height: 1.5;
  font-variation-settings: "opsz" 12;
}
.s-list .dash { color: var(--rust); }
.s-foot {
  margin-top: 28px;
  padding-top: 14px;
  border-top: 1px solid var(--rule-light);
  font-size: 9px;
  text-align: center;
  color: var(--muted);
}

/* FAQ */
.faq { border-top: 2px solid var(--ink); }
.faq-item { border-bottom: 1px solid var(--rule-light); }
.faq-q {
  width: 100%;
  display: grid;
  grid-template-columns: 60px 1fr 32px;
  gap: 24px;
  padding: 24px 4px;
  align-items: center;
  transition: padding 0.2s;
}
.faq-q:hover { padding-left: 14px; padding-right: 14px; background: var(--paper-card); }
.faq-num { color: var(--rust); font-weight: 500; }
.faq-q-text {
  font-family: 'Fraunces', serif;
  font-size: 21px;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.3;
  font-variation-settings: "opsz" 24;
  text-wrap: pretty;
}
.faq-toggle { font-size: 18px; color: var(--muted); text-align: right; }
.faq-item.is-open .faq-toggle { color: var(--rust); }
.faq-a {
  display: grid;
  grid-template-columns: 60px 1fr 32px;
  gap: 24px;
  padding: 0 4px 28px;
  animation: fade 0.3s;
}
.faq-a > * { grid-column: 2; font-size: 16.5px; line-height: 1.65; max-width: 760px; font-variation-settings: "opsz" 14; text-wrap: pretty; }
.faq-a em { color: var(--rust); font-style: italic; font-weight: 500; }

/* CTA */
.cta-block { padding-top: 0; padding-bottom: var(--pad-block); }
.cta-card {
  background: linear-gradient(180deg, #2a2520 0%, #1f1c17 100%);
  color: var(--paper);
  padding: 80px 64px;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(168,52,31,0.18);
}
.cta-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 80px;
  height: 4px;
  background: var(--rust);
}
.cta-kicker {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.cta-kicker::before {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--rust);
}
.cta-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: clamp(48px, 6.4vw, 88px);
  line-height: 0.96;
  letter-spacing: -0.025em;
  font-variation-settings: "opsz" 144;
  margin-bottom: 28px;
}
.cta-title em { color: var(--rust); font-style: italic; font-weight: 300; }
.cta-body {
  font-size: 18px;
  line-height: 1.6;
  max-width: 640px;
  color: rgba(244,241,234,0.85);
  margin-bottom: 40px;
  font-variation-settings: "opsz" 14;
  text-wrap: pretty;
}
.cta-row { display: flex; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary { background: var(--rust); color: var(--paper); }
.btn-primary:hover { background: var(--paper); color: var(--ink); }
.btn-ghost { color: rgba(244,241,234,0.7); border: 1px solid rgba(244,241,234,0.25); }
.btn-ghost:hover { color: var(--paper); border-color: var(--paper); }
.btn .arr { transition: transform 0.2s; }
.btn:hover .arr { transform: translateX(4px); }
.cta-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  padding-top: 28px;
  border-top: 1px solid rgba(244,241,234,0.15);
  font-size: 10px;
  color: rgba(244,241,234,0.5);
}
.cta-meta .dot { color: rgba(244,241,234,0.25); }

/* SITE FOOTER */
.site-footer {
  border-top: 1px solid var(--rule-light);
  background: var(--paper-dark);
  padding: 64px 40px 24px;
}
.sf-grid {
  max-width: 1280px;
  margin: 0 auto 40px;
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
