<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; text-align: right; }
  .ar { font-family: var(--font-arabic); direction: rtl; text-align: right; }
  .big { font-size: 40px; font-weight: 300; line-height: 1.25; color: var(--ink); }
  .big em { font-style: normal; color: var(--rust); font-weight: 500; }
  .body { font-size: 16px; font-weight: 400; line-height: 1.7; color: var(--ink); margin-top: 14px; max-width: 560px; margin-right: 0; margin-left: auto; }
  .note { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 18px; text-align: right; }
</style>
</head>
<body>
  <div class="lbl">IBM Plex Sans Arabic · 300 / 400 / 500</div>
  <div class="ar big">ممارسة دقيقة، بلا أعباء الشركات <em>الكبرى.</em></div>
  <div class="ar body">دفتر للاستشارات — استشارات مالية مستقلة وفق المعايير الدولية.</div>
  <div class="note">RTL · no italic — emphasis is colour-only or weight 500</div>
</body>
</html>
