<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: var(--rule-mid); border: 1px solid var(--rule-mid); }
  .sw { background: var(--paper); padding: 0; }
  .chip { height: 86px; }
  .meta { padding: 12px 12px 16px; }
  .nm { font-family: var(--font-display); font-size: 16px; color: var(--ink); margin-bottom: 6px; }
  .hex { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; }
  .pct { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rust); }
  .ratio { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .ratio em { font-style: normal; color: var(--rust); }
</style>
</head>
<body>
  <div class="ratio">70 / 25 / 5 — never <em>inverted</em></div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F4F1EA;border:1px solid var(--rule-light)"></div><div class="meta"><div class="nm">Paper</div><span class="hex">#F4F1EA</span><span class="pct">~70%</span></div></div>
    <div class="sw"><div class="chip" style="background:#EBE6DA"></div><div class="meta"><div class="nm">Paper Dark</div><span class="hex">#EBE6DA</span><span class="pct">surface</span></div></div>
    <div class="sw"><div class="chip" style="background:#1A1814"></div><div class="meta"><div class="nm">Ink</div><span class="hex">#1A1814</span><span class="pct">~25%</span></div></div>
    <div class="sw"><div class="chip" style="background:#78726A"></div><div class="meta"><div class="nm">Muted</div><span class="hex">#78726A</span><span class="pct">labels</span></div></div>
    <div class="sw"><div class="chip" style="background:#A8341F"></div><div class="meta"><div class="nm">Rust</div><span class="hex">#A8341F</span><span class="pct">~5%</span></div></div>
  </div>
</body>
</html>
