<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 28px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .list { border-top: 2px solid var(--ink); }
  .row { display: grid; grid-template-columns: 70px 1fr 28px; gap: 22px; padding: 22px 4px; border-bottom: 1px solid var(--rule-light); text-decoration: none; color: inherit; align-items: start; transition: background 0.2s ease, padding 0.2s ease; }
  .row:hover { background: rgba(168,52,31,0.04); padding-left: 12px; padding-right: 12px; }
  .row:hover .t { color: var(--rust); }
  .row:hover .a { color: var(--rust); transform: translateX(4px); }
  .num { font-family: var(--font-mono); font-size: 11px; color: var(--rust); letter-spacing: 0.14em; padding-top: 5px; }
  .t { font-family: var(--font-display); font-size: 21px; font-weight: 400; color: var(--ink); line-height: 1.22; letter-spacing: -0.01em; margin-bottom: 8px; transition: color 0.18s; }
  .t em { color: var(--rust); font-style: italic; }
  .s { font-family: var(--font-display); font-size: 14px; color: var(--ink); line-height: 1.5; }
  .a { font-family: var(--font-mono); font-size: 18px; color: var(--muted); text-align: right; padding-top: 5px; transition: all 0.2s ease; }
</style>
</head>
<body>
  <div class="lbl">List row — briefs / contact / areas. Hover insets + rust wash</div>
  <div class="list">
    <a class="row" href="#" onclick="return false">
      <span class="num">№ 001</span>
      <span><span class="t">The SAR 375,000 threshold — ZATCA Phase 2 Wave 24, and why most SMEs are quietly <em>over-sold.</em></span><span class="s">Forthcoming · Q2 2026 · 14 min read</span></span>
      <span class="a">→</span>
    </a>
    <a class="row" href="#" onclick="return false">
      <span class="num">№ 002</span>
      <span><span class="t">UAE Corporate Tax — the first audit <em>season.</em></span><span class="s">In drafting · Q2 2026 · 16 min read</span></span>
      <span class="a">→</span>
    </a>
  </div>
</body>
</html>
