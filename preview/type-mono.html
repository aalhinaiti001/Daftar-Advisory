<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px 22px; align-items: baseline; }
  .m { font-family: var(--font-mono); font-size: 11px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; }
  .muted { color: var(--muted); }
  .rust { color: var(--rust); letter-spacing: 0.18em; }
  .ink { color: var(--ink); }
  .note { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 24px; }
</style>
</head>
<body>
  <div class="lbl">JetBrains Mono · Labels & data · 400 only</div>
  <div class="row">
    <span class="m rust">Services</span>
    <span class="m muted">№ 001 · 09</span>
    <span class="m ink">FIXED SCOPE · FIXED FEE</span>
    <span class="m muted">S / 01</span>
    <span class="m rust">ZATCA · KSA</span>
    <span class="m muted">14 MIN READ</span>
    <span class="m ink">→</span>
  </div>
  <div class="note">Always uppercase · 10–14px · tracked 0.14–0.18em · never bold</div>
</body>
</html>
