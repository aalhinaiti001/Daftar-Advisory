<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }
  .lbl em { font-style: normal; color: var(--rust); }
  .demo { font-family: var(--font-display); font-size: 30px; font-weight: 300; line-height: 1.18; letter-spacing: -0.02em; color: var(--ink); max-width: 560px; }
  .demo em { font-style: italic; color: var(--rust); }
  .rule { width: 40px; height: 2px; background: var(--rust); margin: 22px 0 18px; }
  .note { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .x { color: var(--rust); }
</style>
</head>
<body>
  <div class="lbl">The accent rule — one <em>rust</em> word per headline</div>
  <div class="demo">Senior finance judgement, without the <em>overhead.</em></div>
  <div class="rule"></div>
  <div class="note">Italic + rust in Latin · colour-only in Arabic · <span class="x">never a fill, never a background</span></div>
</body>
</html>
