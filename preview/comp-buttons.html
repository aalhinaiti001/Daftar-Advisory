<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }
  .row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .btn-primary { display: inline-flex; align-items: center; gap: 16px; text-decoration: none; padding: 18px 28px; background: var(--ink); color: var(--paper); border-radius: 2px; font-family: var(--font-display); font-size: 16px; transition: background 0.25s; }
  .btn-primary:hover { background: var(--rust); }
  .btn-primary .arrow { font-family: var(--font-mono); font-size: 16px; color: var(--rust-on-ink); transition: transform 0.25s, color 0.25s; }
  .btn-primary:hover .arrow { transform: translateX(5px); color: var(--paper); }
  .btn-secondary { font-family: var(--font-display); font-size: 16px; color: var(--ink); text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 2px; transition: color 0.2s; }
  .btn-secondary:hover { color: var(--rust); }
  .cta { background: var(--ink); color: var(--paper); padding: 11px 22px; border-radius: 2px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
  .cta:hover { background: var(--rust); }
  .note { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 24px; }
</style>
</head>
<body>
  <div class="lbl">Buttons & links — hover shifts ink → rust</div>
  <div class="row">
    <a href="#" class="btn-primary" onclick="return false">Book a free call <span class="arrow">→</span></a>
    <a href="#" class="cta" onclick="return false">Book a free call</a>
    <a href="#" class="btn-secondary" onclick="return false">See what we do</a>
  </div>
  <div class="note">Radius 2px · arrow nudges on hover · no press-shrink</div>
</body>
</html>
