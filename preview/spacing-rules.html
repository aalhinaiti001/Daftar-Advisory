<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }
  .row { margin-bottom: 26px; }
  .cap { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rust); margin-bottom: 9px; }
  .cap span { color: var(--muted); }
  hr { border: 0; margin: 0; }
</style>
</head>
<body>
  <div class="lbl">Rules — the defining device. Ink hairlines, three weights</div>
  <div class="row"><div class="cap">rule-light <span>· 10% · row dividers</span></div><hr style="border-top:1px solid var(--rule-light)"></div>
  <div class="row"><div class="cap">rule-mid <span>· 22% · table & card borders</span></div><hr style="border-top:1px solid var(--rule-mid)"></div>
  <div class="row"><div class="cap">rule-strong <span>· 100% · 2px · section opening</span></div><hr style="border-top:2px solid var(--rule-strong)"></div>
  <div class="row"><div class="cap">rust rule <span>· under eyebrows & callout borders</span></div><hr style="border-top:2px solid var(--rust); width: 40px"></div>
</body>
</html>
