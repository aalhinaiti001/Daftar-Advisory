<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .stack { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border: 1px solid var(--rule-mid); }
  .surf { padding: 22px 20px 26px; min-height: 120px; }
  .surf + .surf { border-left: 1px solid var(--rule-mid); }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
  .demo { font-family: var(--font-display); font-size: 22px; font-weight: 300; line-height: 1.1; }
  .demo em { font-style: italic; }
</style>
</head>
<body>
  <div class="lbl">Surface stack — depth comes from surface + rule, never shadow</div>
  <div class="stack">
    <div class="surf" style="background:#F4F1EA">
      <div class="tag" style="color:var(--muted)">On Paper</div>
      <div class="demo" style="color:var(--ink)">Rigorous <em style="color:var(--rust)">finance</em></div>
    </div>
    <div class="surf" style="background:#EBE6DA">
      <div class="tag" style="color:var(--muted)">On Paper Dark</div>
      <div class="demo" style="color:var(--ink)">Rigorous <em style="color:var(--rust)">finance</em></div>
    </div>
    <div class="surf" style="background:#1A1814">
      <div class="tag" style="color:var(--rust-on-ink)">On Ink</div>
      <div class="demo" style="color:var(--paper)">Rigorous <em style="color:var(--rust-on-ink)">finance</em></div>
    </div>
  </div>
</body>
</html>
