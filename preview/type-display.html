<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .big { font-family: var(--font-display); font-weight: 300; font-size: 76px; line-height: 0.92; letter-spacing: -0.025em; color: var(--ink); font-variation-settings: "opsz" 144; }
  .big em { font-style: italic; color: var(--rust); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="lbl">Fraunces · Display · 300</div>
  <div class="big">Daftar <em>Advisory.</em></div>
  <div class="meta">opsz 144 · letter-spacing −0.025em · line-height 0.92</div>
</body>
</html>
