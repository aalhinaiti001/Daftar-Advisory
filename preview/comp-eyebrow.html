<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 32px; }
  .stub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 30px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; color: var(--rust); letter-spacing: 0.18em; text-transform: uppercase; display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--rust); }
  .title { font-family: var(--font-display); font-size: 34px; font-weight: 300; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
  .title em { font-style: italic; color: var(--rust); }
  .lede { font-family: var(--font-display); font-size: 16px; line-height: 1.6; color: var(--ink); margin-top: 18px; max-width: 480px; }
</style>
</head>
<body>
  <div class="stub">Section opener — eyebrow + title + lede</div>
  <div class="eyebrow">Services</div>
  <div class="title">Four services. Every one starts with a <em>free call.</em></div>
  <div class="lede">These are the engagements that produce the clearest outcomes — a memo, a working file, a position you can defend.</div>
</body>
</html>
