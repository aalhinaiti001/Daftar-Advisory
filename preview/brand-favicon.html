<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
  .row { display: flex; align-items: center; gap: 28px; }
  .mark { width: 84px; height: 84px; flex-shrink: 0; }
  .mark.sm { width: 40px; height: 40px; }
  .mark.xs { width: 24px; height: 24px; }
  .txt { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); line-height: 1.8; }
  .txt b { color: var(--rust); font-weight: 400; }
</style>
</head>
<body>
  <div class="lbl">The D-mark — the one symbol. Favicon / tiny avatar only.</div>
  <div class="row">
    <img src="../assets/favicon.svg" class="mark" alt="Daftar D-mark">
    <img src="../assets/favicon.svg" class="mark sm" alt="">
    <img src="../assets/favicon.svg" class="mark xs" alt="">
    <div class="txt"><b>Ink D + rust dot</b>on paper · rounded-square 6px<br>Never used as an inline content icon</div>
  </div>
</body>
</html>
