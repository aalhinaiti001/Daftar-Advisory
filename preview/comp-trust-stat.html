<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 30px 32px; background: var(--paper-dark); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 26px; }
  .strip { display: grid; grid-template-columns: repeat(4, 1fr); }
  .item { padding: 0 32px 0 0; border-right: 1px solid var(--rule-mid); }
  .item:last-child { border-right: none; padding-right: 0; }
  .item:not(:first-child) { padding-left: 32px; }
  .num { font-family: var(--font-display); font-size: 44px; font-weight: 300; line-height: 0.95; letter-spacing: -0.03em; color: var(--ink); font-variation-settings: "opsz" 144; margin-bottom: 12px; }
  .num em { font-style: italic; color: var(--rust); font-weight: 400; }
  .cap { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; line-height: 1.7; }
</style>
</head>
<body>
  <div class="lbl">Trust strip — big stats, one rust figure each</div>
  <div class="strip">
    <div class="item"><div class="num"><em>8</em> yrs</div><div class="cap">Big Four trained<br>PwC · EY</div></div>
    <div class="item"><div class="num">SAR <em>3B+</em></div><div class="cap">Revenue audited<br>at EY</div></div>
    <div class="item"><div class="num"><em>4</em></div><div class="cap">Countries active<br>KSA · UAE · JOR · USA</div></div>
    <div class="item"><div class="num"><em>4</em></div><div class="cap">Standards<br>IFRS · SOCPA · GAAP</div></div>
  </div>
</body>
</html>
