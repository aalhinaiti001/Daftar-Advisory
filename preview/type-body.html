<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  p { font-family: var(--font-display); font-size: 17px; line-height: 1.7; color: var(--ink); font-variation-settings: "opsz" 14; max-width: 600px; margin: 0; }
  p em { font-style: italic; color: var(--rust); }
  p strong { font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 18px; }
</style>
</head>
<body>
  <div class="lbl">Fraunces · Body · 400 / 500</div>
  <p>I open the Excel file, read the contracts, write the memo, and stand behind every number. <strong>Fixed scope. Fixed fee.</strong> The working file is <em>yours</em> — formulas intact, assumptions documented, sources cited.</p>
  <div class="meta">17px · line-height 1.7 · opsz 14 · em = italic rust accent</div>
</body>
</html>
