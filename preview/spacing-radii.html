<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; }
  .row { display: flex; gap: 40px; align-items: flex-start; }
  .item { text-align: center; }
  .box { width: 120px; height: 70px; background: var(--ink); margin-bottom: 12px; }
  .r2 { border-radius: 2px; }
  .r0 { border-radius: 0; }
  .cap { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); line-height: 1.6; }
  .cap b { color: var(--rust); font-weight: 400; display: block; }
  .note { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 26px; }
</style>
</head>
<body>
  <div class="lbl">Corner radii — almost everything is square</div>
  <div class="row">
    <div class="item"><div class="box r2"></div><div class="cap"><b>2px</b>buttons · skip-link only</div></div>
    <div class="item"><div class="box r0"></div><div class="cap"><b>0</b>cards · grids · all surfaces</div></div>
  </div>
  <div class="note">No rounded cards. No shadows. No coloured left-borders.</div>
</body>
</html>
